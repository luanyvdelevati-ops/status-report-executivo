<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Reports Executivos</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:40px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    color:#003049;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h2{
    color:#003049;
}

.btn{
    display:inline-block;
    background:#0077b6;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="header">
    <h1>Status Reports Executivos</h1>
    <p>Central de acompanhamento executivo dos clientes Compliance</p>
</div>

<div class="grid">

<div class="card">
    <h2>CEVA</h2>
    <p>Status Report Executivo</p>
    <a class="btn" href="#">Em construção</a>
</div>

<div class="card">
    <h2>Ocyan</h2>
    <p>Status Report Executivo</p>
    <a class="btn" href="#">Em construção</a>
</div>

</div>

</body>
</html>
